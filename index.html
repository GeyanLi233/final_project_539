<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/html5reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Welcome to My Archive</title>
</head>
<body>

    <header>
      <h1>My Bookshelf</h1>
    </header>
    <button id="lamp-toggle" aria-label="Toggle lamp" title="Toggle lamp"></button>
    <button id="audio-toggle" aria-label="Play background music" title="Play / Pause music">
      <img src="image/audio.png" alt="" aria-hidden="true">
    </button>
    <main>
      <div id="bookshelf"></div>
  

      <aside
        id="book-detail"
        role="dialog"
        aria-modal="true"
        aria-labelledby="book-detail-title"
        tabindex="-1"
      >
      <h2 id="book-detail-title">Select a Book</h2>
      <p>Click on the book to see detailed information</p>
    </aside>

    </main>

    <div id="corner-decor">
      <img id="book-pile" src="image/book_pile.png" alt="book pile">
    </div>

    <!-- bgm -->
    <audio id="bgm" loop>
      <source src="audio/ByTheFire.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  
    <!-- import .js -->
    <script src="script.js"></script>
  
  </body>
